<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Congestion Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="controls">
        <h2>Traffic Congestion Prediction</h2>
        <div class="time-selector">
            <label for="time-window">Time Window:</label>
            <select id="time-window">
                <option value="1">Last Hour</option>
                <option value="6">Last 6 Hours</option>
                <option value="12">Last 12 Hours</option>
                <option value="24">Last 24 Hours</option>
            </select>
            <button id="refresh-btn">Refresh Data</button>
        </div>
        <div id="update-status">Last updated: Never</div>
    </div>
    
    <div id="map"></div>
    
    <div id="chart-container">
        <canvas id="congestion-chart"></canvas>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
